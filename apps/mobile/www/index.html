<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>SPOS Shop</title>
    <style>
      :root {
        color: #08111f;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        align-items: center;
        background: linear-gradient(135deg, #effaf3, #fff7e8);
        display: flex;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }

      main {
        background: #ffffff;
        border: 1px solid #dbe7df;
        border-radius: 28px;
        box-shadow: 0 24px 70px rgba(15, 47, 53, 0.16);
        max-width: 360px;
        padding: 28px;
        text-align: center;
      }

      strong {
        display: block;
        font-size: 24px;
        margin-bottom: 10px;
      }

      a {
        color: #047857;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>SPOS Shop</strong>
      <p>The POS opens from the live cloud app.</p>
      <p><a href="https://shop.globalfsms.com">Open shop POS</a></p>
    </main>
  </body>
</html>
