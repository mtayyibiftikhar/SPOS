name: Build Native Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "native-v*"

jobs:
  windows-installer:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate native icons
        run: npm run native:icons

      - name: Build Windows installer
        run: npm run desktop:build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: spos-shop-windows-installer
          path: |
            dist-native/windows/*.exe
            dist-native/windows/*.blockmap

  android-apk:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install root dependencies
        run: npm ci

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Generate native icons
        run: npm run native:icons

      - name: Sync Android project
        run: npm run mobile:sync

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: spos-shop-android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
